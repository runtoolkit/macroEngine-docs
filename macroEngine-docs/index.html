<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Runtoolkit Docs</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0d0f0e;
    --bg2: #131614;
    --border: #2a2f2b;
    --green: #4ade80;
    --green-dim: #166534;
    --tag-bg: #1e2b1f;
    --muted: #6b7a6d;
    --text2: #a8bfaa;
    --heading: #e8f5e9;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text2);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
    padding: 40px 24px;
    max-width: 560px;
    width: 100%;
  }

  .logo {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .title {
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 800;
    color: var(--heading);
    text-align: center;
    line-height: 1.05;
  }
  .title em { color: var(--green); font-style: normal; }

  .desc {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
  }

  .card-link {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    padding: 20px 24px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    text-decoration: none;
    transition: border-color .2s, background .2s;
  }
  .card-link:hover {
    border-color: var(--green-dim);
    background: var(--tag-bg);
  }
  .card-icon { font-size: 28px; flex-shrink: 0; }
  .card-body { flex: 1; }
  .card-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
    margin-bottom: 4px;
  }
  .card-desc {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }
  .card-arrow {
    font-size: 18px;
    color: var(--muted);
    flex-shrink: 0;
    transition: transform .2s, color .2s;
  }
  .card-link:hover .card-arrow {
    transform: translateX(4px);
    color: var(--green);
  }

  .footer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>
<div class="container">
  <span class="logo">Runtoolkit · Documentation</span>

  <h1 class="title">Run<em>toolkit</em><br/>Docs</h1>

  <p class="desc">
    Official documentation hub for Runtoolkit projects.<br/>
    Select a project below to view its API reference.
  </p>

  <a class="card-link" href="./macroEngine-api-docs.html">
    <span class="card-icon">⚙</span>
    <div class="card-body">
      <div class="card-title">macroEngine (AME) — API Reference</div>
      <div class="card-desc">
        Fiber scheduling · 15 modules · pack_format 94 · MC 1.21.11
      </div>
    </div>
    <span class="card-arrow">→</span>
  </a>

  <span class="footer">runtoolkit.com · Minecraft Java Edition only</span>
</div>
</body>
</html>
